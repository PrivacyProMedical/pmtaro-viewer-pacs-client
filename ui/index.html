<!DOCTYPE html>
<html lang="en" class="scheme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download from DICOM server</title>
  <link href="./tailwind.min.css" rel="stylesheet">
  <style>
    body {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #app {
      position: relative;
      height: 100%;
    }

    button[type="button"] {
      font-weight: 600;
      font-size: small;
      text-transform: uppercase;
    }
    button[type="button"]:not(:disabled) {
      cursor: pointer;
    }
    button:disabled {
      pointer-events: none;
    }
    [x-cloak] {
      display: none !important;
    }
    .query-grid-shell {
      border: 1px solid rgb(255 255 255 / 0.1);
      border-radius: 0.25rem;
      overflow: hidden;
    }
    .query-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr) minmax(0, 0.9fr) minmax(0, 1.1fr);
      gap: 1px;
      background: rgb(255 255 255 / 0.1);
      align-items: start;
    }
    .query-grid__header {
      background: rgb(2 6 23 / 0.8);
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      color: rgb(148 163 184);
    }
    .query-grid__cell {
      min-width: 0;
      background: rgb(15 23 42 / 0.3);
      padding: 0.25rem 0.5rem;
    }
    .query-grid__cell--span-2 {
      grid-column: span 2;
    }
    .query-grid__cell--span-3 {
      grid-column: span 3;
    }
    .study-date-controls {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.5rem;
      min-width: 0;
    }
    .study-date-presets {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      min-width: 0;
    }
    .study-date-custom {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0.75rem;
      min-width: 0;
      flex-wrap: wrap;
    }
    .study-date-custom-field {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      min-width: 0;
    }
    .study-date-custom-field input {
      width: 10rem;
      flex: 0 0 10rem;
      min-width: 0;
    }
    @media (max-width: 520px) {
      .study-date-custom {
        flex-direction: column;
        align-items: stretch;
        gap: 0.25rem;
      }
      .study-date-custom-field input {
        width: auto;
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body class="bg-slate-900 text-white">
  <div id="app" x-data="pacsApp()">
    <div class="h-full flex flex-col divide-y divide-white/15">
      <div class="flex-none flex flex-col divide-y divide-white/15">
        <div class="flex flex-col divide-y divide-white/15">
          <div class="flex-none flex flex-col p-1.5 pb-3">
            <div class="flex flex-wrap items-end gap-3 p-1.5">
              <label class="min-w-0 flex-1 flex flex-col">
                <span class="text-sm text-slate-400">PACS Profile</span>
                <select
                  class="bg-slate-800 border-slate-700/10 rounded px-2 py-2 mt-1"
                  :disabled="isProfileActionLocked()"
                  :title="profileActionLockReason"
                  @change="handleProfileSelection($event.target.value)"
                >
                  <template x-for="profile in profiles" :key="profile.id">
                    <option :value="profile.id" :selected="profile.id === selectedProfileId" x-text="profile.name"></option>
                  </template>
                </select>
              </label>
              <div class="flex flex-wrap items-center gap-1.5 p-1.5">
                <div class="relative group">
                  <button type="button" class="rounded bg-slate-700 p-1.5 text-white hover:bg-slate-600 disabled:bg-slate-800 disabled:text-slate-500" :disabled="isCreateProfileDisabled()" aria-label="New Profile" @click="openCreateProfileModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path d="M10.75 4.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5Z" /></svg>
                  </button>
                  <div class="pointer-events-none absolute bottom-full left-1/2 z-50 mb-1.5 -translate-x-1/2 rounded bg-slate-700 px-2 py-0.5 text-xs text-white whitespace-nowrap opacity-0 transition-opacity duration-150 group-hover:opacity-100" x-text="isCreateProfileDisabled() ? profileActionLockReason : 'New Profile'"></div>
                </div>
                <div class="relative group">
                  <button type="button" class="rounded bg-slate-700 p-1.5 text-white hover:bg-slate-600 disabled:bg-slate-800 disabled:text-slate-500" :disabled="!currentProfile || isProfileActionLocked()" aria-label="Edit Profile" @click="openEditProfileModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path d="m5.433 13.917 1.262-3.155A4 4 0 0 1 7.58 9.42l6.92-6.918a2.121 2.121 0 0 1 3 3l-6.92 6.918c-.383.383-.84.685-1.343.886l-3.154 1.262a.5.5 0 0 1-.65-.65Z" /><path d="M3.5 5.75c0-.69.56-1.25 1.25-1.25H10A.75.75 0 0 0 10 3H4.75A2.75 2.75 0 0 0 2 5.75v9.5A2.75 2.75 0 0 0 4.75 18h9.5A2.75 2.75 0 0 0 17 15.25V10a.75.75 0 0 0-1.5 0v5.25c0 .69-.56 1.25-1.25 1.25h-9.5c-.69 0-1.25-.56-1.25-1.25v-9.5Z" /></svg>
                  </button>
                  <div class="pointer-events-none absolute bottom-full left-1/2 z-50 mb-1.5 -translate-x-1/2 rounded bg-slate-700 px-2 py-0.5 text-xs text-white whitespace-nowrap opacity-0 transition-opacity duration-150 group-hover:opacity-100" x-text="isProfileActionLocked() ? profileActionLockReason : 'Edit Profile'"></div>
                </div>
                <div class="relative group">
                  <button type="button" class="rounded bg-rose-900/70 p-1.5 text-rose-100 hover:bg-rose-800 disabled:bg-slate-800 disabled:text-slate-500" :disabled="isDeleteProfileDisabled()" aria-label="Delete Profile" @click="deleteCurrentProfile()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022.841 10.518A2.75 2.75 0 0 0 7.596 19h4.807a2.75 2.75 0 0 0 2.742-2.53l.841-10.52.149.023a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z" clip-rule="evenodd" /></svg>
                  </button>
                  <div class="pointer-events-none absolute bottom-full left-1/2 z-50 mb-1.5 -translate-x-1/2 rounded bg-slate-700 px-2 py-0.5 text-xs text-white whitespace-nowrap opacity-0 transition-opacity duration-150 group-hover:opacity-100" x-text="isProfileActionLocked() ? profileActionLockReason : 'Delete Profile'"></div>
                </div>
                <div class="relative group">
                  <button type="button" class="rounded bg-sky-700 p-1.5 text-white hover:bg-sky-600 disabled:bg-slate-800 disabled:text-slate-500" :disabled="!currentProfile" aria-label="Connect to PACS" @click="runPacsConnect()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path d="M11.983 1.907a.75.75 0 0 0-1.292-.657l-8.5 9.5A.75.75 0 0 0 2.75 12h6.572l-1.305 6.093a.75.75 0 0 0 1.292.657l8.5-9.5A.75.75 0 0 0 17.25 8h-6.572l1.305-6.093Z" /></svg>
                  </button>
                  <div class="pointer-events-none absolute bottom-full left-1/2 z-50 mb-1.5 -translate-x-1/2 rounded bg-slate-700 px-2 py-0.5 text-xs text-white whitespace-nowrap opacity-0 transition-opacity duration-150 group-hover:opacity-100">Connect to PACS</div>
                </div>
                <div class="relative group">
                  <button type="button" class="rounded bg-emerald-700 p-1.5 text-white hover:bg-emerald-600 disabled:bg-slate-800 disabled:text-slate-500" :disabled="!currentProfile" aria-label="Upload to PACS" @click="runPacsUpload()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path d="M9.25 13.25a.75.75 0 0 0 1.5 0V4.636l2.955 3.129a.75.75 0 0 0 1.09-1.03l-4.25-4.5a.75.75 0 0 0-1.09 0l-4.25 4.5a.75.75 0 1 0 1.09 1.03L9.25 4.636v8.614Z" /><path d="M3.5 12.75a.75.75 0 0 0-1.5 0v2.5A2.75 2.75 0 0 0 4.75 18h10.5A2.75 2.75 0 0 0 18 15.25v-2.5a.75.75 0 0 0-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5Z" /></svg>
                  </button>
                  <div class="pointer-events-none absolute bottom-full left-1/2 z-50 mb-1.5 -translate-x-1/2 rounded bg-slate-700 px-2 py-0.5 text-xs text-white whitespace-nowrap opacity-0 transition-opacity duration-150 group-hover:opacity-100">Upload to PACS</div>
                </div>
              </div>
            </div>
            <div class="flex flex-wrap items-center gap-x-4 gap-y-0.5 px-3 py-1.5 text-xs text-slate-300">
              <span><span class="text-slate-500">Host </span><span class="font-medium text-white/80" x-text="currentProfile ? `${currentProfile.host || '-'}:${currentProfile.port}` : '-'"></span></span>
              <span><span class="text-slate-500">Called AE </span><span class="font-medium text-white/80" x-text="currentProfile?.calledAet || '-'"></span></span>
              <span><span class="text-slate-500">My AE </span><span class="font-medium text-white/80" x-text="currentProfile?.myAet || '-'"></span></span>
              <span><span class="text-slate-500">Local Port </span><span class="font-medium text-white/80" x-text="currentProfile?.localPort ?? '-'"></span></span>
              <span><span class="text-slate-500">Timeout </span><span class="font-medium text-white/80" x-text="currentProfile ? `${currentProfile.timeoutSec}s` : '-'"></span></span>
              <span class="min-w-0"><span class="text-slate-500">Storage </span><span class="font-medium text-white/80 truncate" :title="currentProfile?.storageFolder || ''" x-text="currentProfile?.storageFolder || 'Not set'"></span></span>
            </div>
            <p class="px-1.5 pt-1 text-xs text-amber-300" x-show="profileActionLockReason" x-text="profileActionLockReason"></p>
          </div>
        </div>
        <div class="flex flex-col">
          <div class="flex-auto flex flex-col p-1.5 pb-3">
            <div class="query-grid-shell">
              <div class="query-grid">
                <div class="query-grid__header">Tag</div>
                <div class="query-grid__header">Keyword</div>
                <div class="query-grid__header">Tag</div>
                <div class="query-grid__header">Keyword</div>

                <div class="query-grid__cell" x-show="searchLevel !== 'STUDY'">
                  <select class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" disabled><option x-text="searchTags[0]"></option></select>
                </div>
                <div class="query-grid__cell" x-show="searchLevel !== 'STUDY'">
                  <input type="text" class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" placeholder="*" x-model="searchKeys[0]" />
                </div>
                <div class="query-grid__cell" x-show="searchLevel !== 'STUDY'">
                  <select class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" disabled><option x-text="searchTags[1]"></option></select>
                </div>
                <div class="query-grid__cell" x-show="searchLevel !== 'STUDY'">
                  <input type="text" class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" placeholder="*" x-model="searchKeys[1]" />
                </div>

                <div class="query-grid__cell" x-show="searchLevel !== 'STUDY'">
                  <select class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" disabled><option x-text="searchTags[2]"></option></select>
                </div>
                <div class="query-grid__cell" x-show="searchLevel !== 'STUDY'">
                  <input type="text" class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" placeholder="*" x-model="searchKeys[2]" />
                </div>
                <div class="query-grid__cell" x-show="searchLevel !== 'STUDY'">
                  <select class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" disabled><option x-text="searchTags[3]"></option></select>
                </div>
                <div class="query-grid__cell" x-show="searchLevel !== 'STUDY'">
                  <input type="text" class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" placeholder="*" x-model="searchKeys[3]" />
                </div>

                <div class="query-grid__cell" x-show="searchLevel === 'STUDY'">
                  <select class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" disabled><option x-text="searchTags[0]"></option></select>
                </div>
                <div class="query-grid__cell" x-show="searchLevel === 'STUDY'">
                  <input type="text" class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" placeholder="*" x-model="searchKeys[0]" />
                </div>
                <div class="query-grid__cell" x-show="searchLevel === 'STUDY'">
                  <select class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" disabled><option x-text="searchTags[2]"></option></select>
                </div>
                <div class="query-grid__cell" x-show="searchLevel === 'STUDY'">
                  <input type="text" class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" placeholder="*" x-model="searchKeys[2]" />
                </div>

                <div class="query-grid__cell" x-show="searchLevel === 'STUDY'">
                  <select class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" disabled><option x-text="searchTags[3]"></option></select>
                </div>
                <div class="query-grid__cell" x-show="searchLevel === 'STUDY'">
                  <input type="text" class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" placeholder="*" x-model="searchKeys[3]" />
                </div>
                <div class="query-grid__cell" x-show="searchLevel === 'STUDY'">
                  <select class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" disabled><option x-text="searchTags[4]"></option></select>
                </div>
                <div class="query-grid__cell" x-show="searchLevel === 'STUDY'">
                  <input type="text" class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" placeholder="*" x-model="searchKeys[4]" />
                </div>

                <div class="query-grid__cell" x-show="searchLevel === 'STUDY'">
                  <select class="w-full bg-slate-800 border-slate-700/10 rounded px-2 py-1" disabled><option x-text="searchTags[1]"></option></select>
                </div>
                <div class="query-grid__cell query-grid__cell--span-3" x-show="searchLevel === 'STUDY'">
                  <div class="study-date-controls">
                    <div class="study-date-presets">
                      <button type="button" @click="studyDateMode = 'all'" :class="studyDateMode === 'all' ? 'bg-sky-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'" class="rounded px-2 py-0.5 text-xs font-medium transition-colors">All</button>
                      <button type="button" @click="studyDateMode = 'today'" :class="studyDateMode === 'today' ? 'bg-sky-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'" class="rounded px-2 py-0.5 text-xs font-medium transition-colors">Today</button>
                      <button type="button" @click="studyDateMode = 'week'" :class="studyDateMode === 'week' ? 'bg-sky-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'" class="rounded px-2 py-0.5 text-xs font-medium transition-colors">This Week</button>
                      <button type="button" @click="studyDateMode = 'month'" :class="studyDateMode === 'month' ? 'bg-sky-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'" class="rounded px-2 py-0.5 text-xs font-medium transition-colors">This Month</button>
                      <button type="button" @click="studyDateMode = 'custom'" :class="studyDateMode === 'custom' ? 'bg-sky-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'" class="rounded px-2 py-0.5 text-xs font-medium transition-colors">Custom</button>
                    </div>
                    <div x-show="studyDateMode === 'custom'" class="study-date-custom">
                      <div class="study-date-custom-field">
                        <span class="text-xs text-slate-400 w-6 shrink-0">From</span>
                        <input type="date" lang="en-US" class="bg-slate-800 border border-slate-700/30 rounded px-1.5 py-0.5 text-xs text-white [color-scheme:dark] flex-1 min-w-0"
                          :value="formatDicomToDate(studyDateFrom)"
                          @change="studyDateFrom = formatDateToDicom($event.target.value)" />
                      </div>
                      <div class="study-date-custom-field">
                        <span class="text-xs text-slate-400 w-6 shrink-0">To</span>
                        <input type="date" lang="en-US" class="bg-slate-800 border border-slate-700/30 rounded px-1.5 py-0.5 text-xs text-white [color-scheme:dark] flex-1 min-w-0"
                          :value="formatDicomToDate(studyDateTo)"
                          @change="studyDateTo = formatDateToDicom($event.target.value)" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="relative">
            <hr class="absolute inset-x-3 -top-2.5 border-white/15" />
          </div>
          <div class="flex-none flex flex-col gap-1 p-3 py-2 pt-0">
            <div class="flex items-center">
              <fieldset class="flex items-center text-sm text-slate-400">
                <legend class="float-left mr-3">Level:</legend>
                <label class="inline-flex items-center mr-2">
                  <input class="text-blue-500 border-0 ring-0 outline-0" type="radio" name="level" x-model="searchLevel" @change="setSearchLevel($event.target.value)" value="PATIENT" />
                  <span class="ml-1" :class="searchLevel === 'PATIENT' ? 'text-white' : ''">Patient</span>
                </label>
                <label class="inline-flex items-center mr-2">
                  <input class="text-blue-500 border-0 ring-0 outline-0" type="radio" name="level" x-model="searchLevel" @change="setSearchLevel($event.target.value)" value="STUDY" />
                  <span class="ml-1" :class="searchLevel === 'STUDY' ? 'text-white' : ''">Study</span>
                </label>
                <label class="inline-flex items-center mr-2">
                  <input class="text-blue-500 border-0 ring-0 outline-0" type="radio" name="level" x-model="searchLevel" @change="setSearchLevel($event.target.value)" value="SERIES" />
                  <span class="ml-1" :class="searchLevel === 'SERIES' ? 'text-white' : ''">Series</span>
                </label>
              </fieldset>
              <button type="button" class="inline-flex justify-center items-center text-center text-sm ml-auto bg-sky-600 px-3 py-1 rounded hover:cursor-pointer disabled:cursor-not-allowed disabled:bg-sky-300/30 disabled:text-gray-300" :disabled="false" @click="runPacsSearch()">
                <span>Search</span>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="flex-auto relative">
        <div class="px-3 py-2 absolute inset-0 overflow-auto">
          <ul>
            <template x-for="(rec, i) in records">
              <li class="mb-3">
                <fieldset class="relative px-3 pt-1 pb-2 rounded border border-white/15 bg-slate-800/80 hover:bg-slate-800 transition">
                  <legend>
                    <b x-text="`${searchLevel.toLowerCase()} ${i + 1}`" class="ml-3 text-base capitalize"></b>
                  </legend>
                  <template x-for="field in rec.fields">
                    <div class="text-sm">
                      <span x-text="`(${field.tag})`" class="tabular-nums"></span> <span x-text="field.keyword"></span>: <span x-text="field.value"></span>
                    </div>
                  </template>
                  <div class="mt-3 min-h-4 pr-28 text-xs font-medium" :class="getRecordDownloadStatusClass(rec)">
                    <span x-text="getRecordDownloadStatusText(rec)"></span>
                  </div>
                  <button type="button" class="text-white disabled:text-white/50 hover:text-sky-500 text-lg! absolute right-0 bottom-0 mx-4 my-2" :disabled="!storageFolder || isRecordDownloadBusy(rec)" @click="runPacsDownload(rec)">
                    <span x-text="getRecordDownloadButtonLabel(rec)"></span>
                  </button>
                </fieldset>
              </li>
            </template>
          </ul>
        </div>
      </div>
      <div class="flex-none border-t border-white/15 bg-slate-950/90 px-3 py-2 text-xs font-medium" role="status" aria-live="polite">
        <span
          x-text="connectionStatus || 'Ready'"
          :class="{
            'text-emerald-400': connectionStatusType === 'success',
            'text-rose-400': connectionStatusType === 'error',
            'text-sky-300': connectionStatusType === 'info',
            'text-slate-400': !connectionStatus,
          }"
        ></span>
      </div>

      <div
        x-cloak
        x-show="profileModal.open"
        class="absolute inset-0 z-20 flex items-center justify-center bg-slate-950/80 px-4 py-6"
      >
        <div class="absolute inset-0" @click="closeProfileModal()"></div>
        <div x-transition class="relative w-full max-w-3xl rounded-xl border border-white/15 bg-slate-900 shadow-2xl">
          <div class="flex items-center justify-between border-b border-white/15 px-4 py-3">
            <div>
              <h2 class="text-base font-semibold text-white" x-text="profileModalTitle"></h2>
              <p class="mt-1 text-sm text-slate-400">Save PACS host settings locally and reuse them later.</p>
            </div>
            <div class="relative group">
              <button type="button" class="rounded bg-slate-800 p-1.5 text-white hover:bg-slate-700" aria-label="Close" @click="closeProfileModal()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" /></svg>
              </button>
              <div class="pointer-events-none absolute bottom-full right-0 z-50 mb-1.5 rounded bg-slate-700 px-2 py-0.5 text-xs text-white whitespace-nowrap opacity-0 transition-opacity duration-150 group-hover:opacity-100">Close</div>
            </div>
          </div>

          <div class="p-4">
            <div class="grid gap-4 md:grid-cols-2">
              <label class="flex flex-col">
                <span class="text-sm text-slate-400">Profile Name</span>
                <input type="text" class="bg-slate-800 border-slate-700/10 rounded px-3 py-2 mt-1" x-model="profileDraft.name" @input="clearProfileError('name')" />
                <span class="mt-1 text-xs text-rose-400" x-show="profileErrors.name" x-text="profileErrors.name"></span>
              </label>

              <label class="flex flex-col">
                <span class="text-sm text-slate-400">Host</span>
                <input type="text" class="bg-slate-800 border-slate-700/10 rounded px-3 py-2 mt-1" x-model="profileDraft.host" @input="clearProfileError('host')" />
                <span class="mt-1 text-xs text-rose-400" x-show="profileErrors.host" x-text="profileErrors.host"></span>
              </label>

              <label class="flex flex-col">
                <span class="text-sm text-slate-400">Port</span>
                <input type="number" min="1" max="65535" step="1" inputmode="numeric" class="bg-slate-800 border-slate-700/10 rounded px-3 py-2 mt-1" x-model.number="profileDraft.port" @input="clearProfileError('port')" />
                <span class="mt-1 text-xs text-rose-400" x-show="profileErrors.port" x-text="profileErrors.port"></span>
              </label>

              <label class="flex flex-col">
                <span class="text-sm text-slate-400">Called AE</span>
                <input type="text" class="bg-slate-800 border-slate-700/10 rounded px-3 py-2 mt-1" x-model="profileDraft.calledAet" @input="clearProfileError('calledAet')" />
                <span class="mt-1 text-xs text-rose-400" x-show="profileErrors.calledAet" x-text="profileErrors.calledAet"></span>
              </label>

              <label class="flex flex-col">
                <span class="text-sm text-slate-400">My AE</span>
                <input type="text" class="bg-slate-800 border-slate-700/10 rounded px-3 py-2 mt-1" x-model="profileDraft.myAet" @input="clearProfileError('myAet')" />
                <span class="mt-1 text-xs text-rose-400" x-show="profileErrors.myAet" x-text="profileErrors.myAet"></span>
              </label>

              <label class="flex flex-col">
                <span class="text-sm text-slate-400">Local Port</span>
                <input type="number" min="1" max="65535" step="1" inputmode="numeric" class="bg-slate-800 border-slate-700/10 rounded px-3 py-2 mt-1" x-model.number="profileDraft.localPort" @input="clearProfileError('localPort')" />
                <span class="mt-1 text-xs text-rose-400" x-show="profileErrors.localPort" x-text="profileErrors.localPort"></span>
              </label>

              <label class="flex flex-col md:col-span-2">
                <span class="text-sm text-slate-400">Storage Folder</span>
                <div class="mt-1 flex gap-2">
                  <input type="text" readonly class="flex-1 bg-slate-800 border-slate-700/10 rounded px-3 py-2" x-model="profileDraft.storageFolder" :title="profileDraft.storageFolder" />
                  <button type="button" class="rounded bg-slate-700 px-3 py-2 text-xs text-white hover:bg-slate-600" @click="selectProfileDraftStorageFolder()">Browse</button>
                </div>
                <span class="mt-1 text-xs text-rose-400" x-show="profileErrors.storageFolder" x-text="profileErrors.storageFolder"></span>
              </label>

              <label class="flex flex-col">
                <span class="text-sm text-slate-400">Timeout (seconds)</span>
                <input type="number" min="0" step="1" inputmode="numeric" class="bg-slate-800 border-slate-700/10 rounded px-3 py-2 mt-1" x-model.number="profileDraft.timeoutSec" />
              </label>
            </div>

            <div class="mt-4 flex items-center justify-end gap-2 border-t border-white/15 pt-4">
              <button type="button" class="rounded bg-slate-800 px-3 py-2 text-xs text-white hover:bg-slate-700" @click="closeProfileModal()">Cancel</button>
              <button type="button" class="rounded bg-sky-700 px-3 py-2 text-xs text-white hover:bg-sky-600" @click="saveProfileModal()" x-text="profileModalSaveLabel"></button>
            </div>
          </div>
        </div>
      </div>

      <div
        x-cloak
        x-show="deleteConfirmModal.open"
        class="absolute inset-0 z-30 flex items-center justify-center bg-slate-950/80 px-4"
      >
        <div class="absolute inset-0" @click="deleteConfirmModal.open = false"></div>
        <div x-transition class="relative w-full max-w-sm rounded-xl border border-white/15 bg-slate-900 p-5 shadow-2xl">
          <div class="flex items-start gap-3">
            <div class="flex-none rounded-full bg-rose-900/40 p-2 text-rose-400">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5"><path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022.841 10.518A2.75 2.75 0 0 0 7.596 19h4.807a2.75 2.75 0 0 0 2.742-2.53l.841-10.52.149.023a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z" clip-rule="evenodd" /></svg>
            </div>
            <div>
              <h3 class="text-sm font-semibold text-white">Delete Profile?</h3>
              <p class="mt-1 text-xs text-slate-400">Delete "<span class="font-medium text-white/80" x-text="currentProfile?.name || ''"></span>"? This cannot be undone.</p>
            </div>
          </div>
          <div class="mt-4 flex items-center justify-end gap-2">
            <button type="button" class="rounded bg-slate-800 px-3 py-1.5 text-xs text-white hover:bg-slate-700" @click="deleteConfirmModal.open = false">Cancel</button>
            <button type="button" class="rounded bg-rose-700 px-3 py-1.5 text-xs text-white hover:bg-rose-600" @click="confirmDeleteProfile()">Delete</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./alpinejs@3.15.8/dist/cdn.min.js" defer></script>
  <script type="module">
    import {
      PacsDownloadQueue,
      createDownloadRequestFingerprint,
      isPendingDownloadState,
      toPlainDownloadRequest,
    } from './download-queue.js';
    import {
      createDefaultProfile,
      createProfileId,
      hasPendingProfileOperations,
      loadProfileState,
      removeProfileState,
      saveProfileState,
      selectProfileState,
      toRuntimeProfile,
      upsertProfileState,
      validateProfileDraft,
    } from './pacs-profiles.js';

    const appRoot = document.getElementById('app');
    let data = null;
    let appRegistered = false;

    function registerApp() {
      if (appRegistered) {
        return;
      }
      appRegistered = true;

      Alpine.data('pacsApp', () => ({
        myAet: 'PMTARO',
        timeoutSec: 3,

        pacs: {
          aet: 'ORTHANC',
          host: '127.0.0.1',
          port: 4242,
          localPort: 10104,
        },

        profiles: [],
        selectedProfileId: '',
        profileModal: {
          open: false,
          mode: 'create',
        },
        profileDraft: createDefaultProfile({
          id: createProfileId(),
          name: '',
        }),
        profileErrors: {},
        deleteConfirmModal: {
          open: false,
        },

        records: [],
        get recordsPre() {
          return JSON.stringify(this.records, null, 2);
        },
        storageFolder: '',

        get currentProfile() {
          return this.profiles.find((profile) => profile.id === this.selectedProfileId) ?? null;
        },

        get profileModalTitle() {
          return this.profileModal.mode === 'edit' ? 'Edit PACS Profile' : 'New PACS Profile';
        },

        get profileModalSaveLabel() {
          return this.profileModal.mode === 'edit' ? 'Save Changes' : 'Create Profile';
        },

        get profileActionLockReason() {
          return this.isProfileActionLocked()
            ? 'Profile changes are disabled while PACS downloads are queued or running.'
            : '';
        },

        searchLevel: 'PATIENT',
        searchTags: ['PatientID', 'PatientName', 'PatientBirthDate', 'PatientSex'],
        searchKeys: ['', '', '', '', ''],
        studyDateMode: 'all',
        studyDateFrom: '',
        studyDateTo: '',
        connectionStatus: '',
        connectionStatusType: 'info',
        downloadQueue: new PacsDownloadQueue(),
        downloadPollTimerId: null,
        downloadPollInFlight: false,

        init() {
          const restoredState = saveProfileState(window.localStorage, loadProfileState(window.localStorage));
          this.profiles = restoredState.profiles;
          this.selectedProfileId = restoredState.selectedProfileId;
          this.syncRuntimeFromSelectedProfile();
          data = this;
        },

        createProfileState() {
          return {
            selectedProfileId: this.selectedProfileId,
            profiles: this.profiles,
          };
        },

        persistProfileState(nextState = this.createProfileState()) {
          const persistedState = saveProfileState(window.localStorage, nextState);
          this.profiles = persistedState.profiles;
          this.selectedProfileId = persistedState.selectedProfileId;
          return persistedState;
        },

        syncRuntimeFromSelectedProfile(options = {}) {
          const profile = this.currentProfile;
          if (!profile) {
            return;
          }

          const runtimeProfile = toRuntimeProfile(profile);
          this.myAet = runtimeProfile.myAet;
          this.timeoutSec = runtimeProfile.timeoutSec;
          this.storageFolder = runtimeProfile.storageFolder;
          this.pacs = { ...runtimeProfile.pacs };

          if (options.clearRecords) {
            this.records = [];
          }
        },

        createProfileDraft(profile = null) {
          if (profile) {
            return { ...profile };
          }

          return createDefaultProfile({
            id: createProfileId(),
            name: '',
          });
        },

        clearProfileError(fieldName) {
          if (!this.profileErrors[fieldName]) {
            return;
          }

          delete this.profileErrors[fieldName];
          this.profileErrors = { ...this.profileErrors };
        },

        isProfileActionLocked() {
          return hasPendingProfileOperations(this.downloadQueue);
        },

        isCreateProfileDisabled() {
          return this.isProfileActionLocked();
        },

        isDeleteProfileDisabled() {
          return !this.currentProfile || this.isProfileActionLocked();
        },

        getDeleteProfileDisabledReason() {
          if (this.isProfileActionLocked()) {
            return this.profileActionLockReason;
          }
          return '';
        },

        handleProfileSelection(profileId) {
          if (this.isProfileActionLocked()) {
            this.setConnectionStatus(this.profileActionLockReason, 'info');
            return;
          }

          const nextState = selectProfileState(this.createProfileState(), profileId);
          this.persistProfileState(nextState);
          this.syncRuntimeFromSelectedProfile({ clearRecords: true });

          if (this.currentProfile) {
            this.setConnectionStatus(`Switched to PACS profile: ${this.currentProfile.name}. Search results cleared.`, 'info');
          }
        },

        openCreateProfileModal() {
          if (this.isCreateProfileDisabled()) {
            this.setConnectionStatus(this.profileActionLockReason, 'info');
            return;
          }

          this.profileModal = {
            open: true,
            mode: 'create',
          };
          this.profileDraft = this.createProfileDraft();
          this.profileErrors = {};
        },

        openEditProfileModal() {
          if (!this.currentProfile) {
            return;
          }
          if (this.isProfileActionLocked()) {
            this.setConnectionStatus(this.profileActionLockReason, 'info');
            return;
          }

          this.profileModal = {
            open: true,
            mode: 'edit',
          };
          this.profileDraft = this.createProfileDraft(this.currentProfile);
          this.profileErrors = {};
        },

        closeProfileModal() {
          this.profileModal = {
            ...this.profileModal,
            open: false,
          };
          this.profileErrors = {};
        },

        saveProfileModal() {
          const modalMode = this.profileModal.mode;
          const editingId = modalMode === 'edit' ? this.profileDraft.id : null;
          const result = validateProfileDraft(this.profileDraft, this.profiles, editingId);

          this.profileErrors = result.errors;
          if (!result.isValid) {
            this.setConnectionStatus('Profile save failed: fix the highlighted fields.', 'error');
            return;
          }

          const nextState = upsertProfileState(this.createProfileState(), result.profile, { select: true });
          this.persistProfileState(nextState);
          this.closeProfileModal();
          this.syncRuntimeFromSelectedProfile({ clearRecords: true });
          this.setConnectionStatus(
            modalMode === 'edit'
              ? `Updated PACS profile: ${result.profile.name}. Search results cleared.`
              : `Added PACS profile: ${result.profile.name}. Search results cleared.`,
            'success',
          );
        },

        deleteCurrentProfile() {
          if (this.isDeleteProfileDisabled()) {
            const reason = this.getDeleteProfileDisabledReason();
            if (reason) {
              this.setConnectionStatus(reason, 'info');
            }
            return;
          }
          this.deleteConfirmModal.open = true;
        },

        confirmDeleteProfile() {
          const currentProfile = this.currentProfile;
          if (!currentProfile) {
            this.deleteConfirmModal.open = false;
            return;
          }
          const { removed, state } = removeProfileState(this.createProfileState(), currentProfile.id);
          this.deleteConfirmModal.open = false;
          if (!removed) {
            return;
          }
          this.persistProfileState(state);
          this.syncRuntimeFromSelectedProfile({ clearRecords: true });
          this.setConnectionStatus(`Deleted PACS profile: ${currentProfile.name}. Search results cleared.`, 'info');
        },

        setSearchLevel(lv) {
          this.searchLevel = lv;
          switch (this.searchLevel) {
            case 'PATIENT':
              this.searchTags = ['PatientID', 'PatientName', 'PatientBirthDate', 'PatientSex'];
              this.searchKeys = ['', '', '', ''];
              break;
            case 'STUDY':
              this.searchTags = ['AccessionNumber', 'StudyDate', 'StudyTime', 'StudyDescription', 'StudyID'];
              this.searchKeys = ['', '', '', '', ''];
              // studyDateMode/studyDateFrom/studyDateTo intentionally preserved
              break;
            case 'SERIES':
              this.searchTags = ['SeriesDate', 'SeriesTime', 'SeriesDescription', 'Modality'];
              this.searchKeys = ['', '', '', ''];
              break;
            default:
              this.searchTags = [];
              this.searchKeys = [];
          }
        },

        formatDateToDicom(dateStr) {
          if (!dateStr || dateStr.length !== 10) return '';
          return dateStr.replace(/-/g, '');
        },

        formatDicomToDate(dicomStr) {
          if (!dicomStr || dicomStr.length !== 8 || !/^\d{8}$/.test(dicomStr)) return '';
          return `${dicomStr.slice(0, 4)}-${dicomStr.slice(4, 6)}-${dicomStr.slice(6, 8)}`;
        },

        buildStudyDateKey() {
          const pad2 = (n) => String(n).padStart(2, '0');
          const todayStr = () => {
            const d = new Date();
            return `${d.getFullYear()}${pad2(d.getMonth() + 1)}${pad2(d.getDate())}`;
          };
          const mondayStr = () => {
            const d = new Date();
            const day = d.getDay();
            const diff = day === 0 ? -6 : 1 - day;
            d.setDate(d.getDate() + diff);
            return `${d.getFullYear()}${pad2(d.getMonth() + 1)}${pad2(d.getDate())}`;
          };
          const firstOfMonthStr = () => {
            const d = new Date();
            return `${d.getFullYear()}${pad2(d.getMonth() + 1)}01`;
          };
          switch (this.studyDateMode) {
            case 'all': return null;
            case 'today': return `StudyDate=${todayStr()}`;
            case 'week': return `StudyDate=${mondayStr()}-${todayStr()}`;
            case 'month': return `StudyDate=${firstOfMonthStr()}-${todayStr()}`;
            case 'custom': {
              const from = this.studyDateFrom.trim();
              const to = this.studyDateTo.trim();
              if (!from && !to) return null;
              if (from && to) return `StudyDate=${from}-${to}`;
              if (from) return `StudyDate=${from}-`;
              return `StudyDate=-${to}`;
            }
            default: return null;
          }
        },

        parsePortNumber(value, fieldName) {
          const port = typeof value === 'number' ? value : Number(String(value).trim());
          if (!Number.isInteger(port) || port < 1 || port > 65535) {
            console.error(`${fieldName} must be an integer between 1 and 65535`);
            return null;
          }
          return port;
        },

        setConnectionStatus(message, type = 'info') {
          this.connectionStatus = message;
          this.connectionStatusType = type;
        },

        createIdleDownloadState() {
          return {
            state: 'idle',
            queuePosition: null,
            jobId: '',
            totalInstances: null,
            downloadedInstances: 0,
            error: '',
            downloadedFiles: [],
          };
        },

        cloneDownloadState(download) {
          return {
            ...this.createIdleDownloadState(),
            ...(download ?? {}),
          };
        },

        buildRecordRowKey(record) {
          const signature = (record.fields ?? [])
            .map((field) => `${field.keyword}=${field.value}`)
            .join('|');
          return `${this.searchLevel}:${signature}`;
        },

        decorateSearchRecords(records) {
          const previousStates = new Map(
            this.records.map((record) => [record.rowKey, this.cloneDownloadState(record.download)]),
          );

          return (records ?? []).map((record) => {
            const rowKey = this.buildRecordRowKey(record);
            return {
              ...record,
              rowKey,
              download: previousStates.get(rowKey) ?? this.createIdleDownloadState(),
            };
          });
        },

        findRecord(rowKey) {
          return this.records.find((record) => record.rowKey === rowKey) ?? null;
        },

        ensureRecordDownload(record) {
          if (!record.download) {
            record.download = this.createIdleDownloadState();
          }
          return record.download;
        },

        updateRecordDownload(rowKey, updates) {
          const record = this.findRecord(rowKey);
          if (!record) {
            return;
          }

          const download = this.ensureRecordDownload(record);
          Object.assign(download, updates);
          if (!isPendingDownloadState(download.state)) {
            download.queuePosition = null;
          }
        },

        syncQueuedDownloadStates() {
          for (const record of this.records) {
            const download = this.ensureRecordDownload(record);
            if (download.state === 'queued') {
              download.queuePosition = this.downloadQueue.getQueuePosition(record.rowKey);
            }
          }
        },

        getRecordDownloadState(record) {
          return record?.download?.state ?? 'idle';
        },

        isRecordDownloadBusy(record) {
          return isPendingDownloadState(this.getRecordDownloadState(record));
        },

        getRecordDownloadButtonLabel(record) {
          switch (this.getRecordDownloadState(record)) {
            case 'queued':
              return 'Queued';
            case 'preparing':
              return 'Preparing';
            case 'downloading':
              return 'Downloading';
            default:
              return 'Download';
          }
        },

        getRecordDownloadStatusText(record) {
          const download = record?.download ?? this.createIdleDownloadState();
          switch (download.state) {
            case 'queued':
              return download.queuePosition ? `Queued (#${download.queuePosition})` : 'Queued';
            case 'preparing':
              return 'Preparing download...';
            case 'downloading':
              return download.totalInstances == null
                ? `Downloading ${download.downloadedInstances} instance(s)`
                : `Downloading ${download.downloadedInstances} / ${download.totalInstances} instance(s)`;
            case 'completed': {
              const downloadedCount = Array.isArray(download.downloadedFiles)
                ? download.downloadedFiles.length
                : download.downloadedInstances;
              return `Completed: ${downloadedCount} file(s) saved.`;
            }
            case 'failed':
              return download.error ? `Failed: ${download.error}` : 'Failed';
            default:
              return '';
          }
        },

        getRecordDownloadStatusClass(record) {
          const state = this.getRecordDownloadState(record);
          return {
            'text-amber-300': state === 'queued',
            'text-sky-300': state === 'preparing' || state === 'downloading',
            'text-emerald-400': state === 'completed',
            'text-rose-400': state === 'failed',
            'text-slate-500': state === 'idle',
          };
        },

        buildDownloadKeys(record) {
          const level = this.searchLevel;
          const keys = [];

          if (level === 'PATIENT') {
            const patientIdField = record.fields.find((field) => field.keyword === 'PatientID');
            if (patientIdField?.value) {
              keys.push(`PatientID=${patientIdField.value}`);
            }
            const patientNameField = record.fields.find((field) => field.keyword === 'PatientName');
            if (patientNameField?.value) {
              keys.push(`PatientName=${patientNameField.value}`);
            }
          } else if (level === 'STUDY') {
            const studyInstanceUIDField = record.fields.find((field) => field.keyword === 'StudyInstanceUID');
            if (studyInstanceUIDField?.value) {
              keys.push(`StudyInstanceUID=${studyInstanceUIDField.value}`);
            }
          } else if (level === 'SERIES') {
            const seriesInstanceUIDField = record.fields.find((field) => field.keyword === 'SeriesInstanceUID');
            if (seriesInstanceUIDField?.value) {
              keys.push(`SeriesInstanceUID=${seriesInstanceUIDField.value}`);
            }
          }

          return keys;
        },

        buildDownloadRequest(record) {
          const keys = this.buildDownloadKeys(record);
          if (!keys.length) {
            this.setConnectionStatus('Download failed: unable to resolve query keys for this result.', 'error');
            return null;
          }

          if (!this.storageFolder) {
            this.setConnectionStatus('Download failed: storage folder is required.', 'error');
            return null;
          }

          const port = this.parsePortNumber(this.pacs.port, 'Port');
          if (port === null) {
            this.setConnectionStatus('Download failed: port must be an integer between 1 and 65535.', 'error');
            return null;
          }

          const localPort = this.parsePortNumber(this.pacs.localPort, 'Local Port');
          if (localPort === null) {
            this.setConnectionStatus('Download failed: local port must be an integer between 1 and 65535.', 'error');
            return null;
          }

          const request = {
            host: this.pacs.host,
            port,
            localPort,
            calledAet: this.pacs.aet,
            callingAet: this.myAet,
            timeoutSec: this.timeoutSec,
            level: this.searchLevel,
            keys,
            outputDir: this.storageFolder,
          };

          return {
            rowKey: record.rowKey,
            request,
            requestFingerprint: createDownloadRequestFingerprint(request),
          };
        },

        getQueueSummary() {
          const activeCount = this.downloadQueue.getActive() ? 1 : 0;
          const waitingCount = this.downloadQueue.waitingCount;
          if (!activeCount && !waitingCount) {
            return '';
          }
          if (activeCount && waitingCount) {
            return `${activeCount} in progress, ${waitingCount} queued.`;
          }
          if (activeCount) {
            return '1 in progress.';
          }
          return `${waitingCount} queued.`;
        },

        withQueueSummary(message) {
          const summary = this.getQueueSummary();
          return summary ? `${message} ${summary}` : message;
        },

        describeDownloadProgress(status) {
          const downloadedInstances = typeof status?.downloadedInstances === 'number'
            ? status.downloadedInstances
            : 0;

          if (typeof status?.totalInstances === 'number') {
            return `${downloadedInstances} / ${status.totalInstances} instance(s)`;
          }

          return `${downloadedInstances} instance(s)`;
        },

        describeDownloadFailure(reason) {
          if (typeof reason?.error === 'string' && reason.error.trim()) {
            return reason.error.trim();
          }
          if (typeof reason?.message === 'string' && reason.message.trim()) {
            return reason.message.trim();
          }
          if (typeof reason?.exitCode === 'number') {
            return `exit code ${reason.exitCode}`;
          }
          return String(reason ?? 'Unknown error');
        },

        startDownloadPolling() {
          if (this.downloadPollTimerId !== null) {
            return;
          }

          this.downloadPollTimerId = window.setInterval(() => {
            this.pollActiveDownload().catch((err) => {
              console.error(err);
            });
          }, 700);
        },

        stopDownloadPolling() {
          if (this.downloadPollTimerId !== null) {
            window.clearInterval(this.downloadPollTimerId);
            this.downloadPollTimerId = null;
          }
          this.downloadPollInFlight = false;
        },

        async finishActiveDownload(status) {
          this.stopDownloadPolling();
          const { finished } = this.downloadQueue.advance();
          this.syncQueuedDownloadStates();

          if (!finished) {
            return;
          }

          const downloadedFiles = Array.isArray(status?.downloadedFiles) ? status.downloadedFiles : [];
          const downloadedInstances = typeof status?.downloadedInstances === 'number'
            ? status.downloadedInstances
            : downloadedFiles.length;

          if (status?.state === 'completed') {
            this.updateRecordDownload(finished.rowKey, {
              state: 'completed',
              jobId: status.jobId ?? finished.jobId ?? '',
              totalInstances: typeof status.totalInstances === 'number' ? status.totalInstances : null,
              downloadedInstances,
              error: '',
              downloadedFiles,
            });
            this.setConnectionStatus(
              this.withQueueSummary(`Download completed: ${downloadedFiles.length} file(s) saved.`),
              'success',
            );

            const downloadedFilePath = downloadedFiles[0];
            if (downloadedFilePath) {
              await $electron?.showInFolder(downloadedFilePath, true);
            }
          } else {
            const details = this.describeDownloadFailure(status);
            this.updateRecordDownload(finished.rowKey, {
              state: 'failed',
              jobId: status?.jobId ?? finished.jobId ?? '',
              totalInstances: typeof status?.totalInstances === 'number' ? status.totalInstances : null,
              downloadedInstances,
              error: details,
              downloadedFiles,
            });
            this.setConnectionStatus(this.withQueueSummary(`Download failed: ${details}`), 'error');
          }

          await this.startNextQueuedDownload();
        },

        async finishActiveDownloadWithError(error) {
          const activeItem = this.downloadQueue.getActive();
          if (!activeItem) {
            this.stopDownloadPolling();
            return;
          }

          await this.finishActiveDownload({
            state: 'failed',
            jobId: activeItem.jobId ?? '',
            outputDir: activeItem.request.outputDir,
            totalInstances: null,
            downloadedInstances: 0,
            error: this.describeDownloadFailure(error),
            downloadedFiles: [],
          });
        },

        applyDownloadStatus(activeItem, status) {
          const downloadedFiles = Array.isArray(status?.downloadedFiles) ? status.downloadedFiles : [];
          this.updateRecordDownload(activeItem.rowKey, {
            state: status?.state ?? 'downloading',
            jobId: status?.jobId ?? activeItem.jobId ?? '',
            totalInstances: typeof status?.totalInstances === 'number' ? status.totalInstances : null,
            downloadedInstances: typeof status?.downloadedInstances === 'number' ? status.downloadedInstances : 0,
            error: status?.error ?? '',
            downloadedFiles,
          });

          if (status?.state === 'preparing') {
            this.setConnectionStatus(this.withQueueSummary('Preparing PACS download...'), 'info');
          } else if (status?.state === 'downloading') {
            this.setConnectionStatus(
              this.withQueueSummary(`Downloading from PACS: ${this.describeDownloadProgress(status)}`),
              'info',
            );
          }
        },

        async pollActiveDownload() {
          const activeItem = this.downloadQueue.getActive();
          if (!activeItem?.jobId || this.downloadPollInFlight) {
            return;
          }

          this.downloadPollInFlight = true;
          try {
            const status = await $electron?.api('@pmt/pacs-client/pacsDownloadStatus', activeItem.jobId);
            if (!status) {
              return;
            }

            this.applyDownloadStatus(activeItem, status);

            if (status.state === 'completed' || status.state === 'failed') {
              await this.finishActiveDownload(status);
            }
          } catch (err) {
            await this.finishActiveDownloadWithError(err);
          } finally {
            this.downloadPollInFlight = false;
          }
        },

        async startNextQueuedDownload() {
          if (this.downloadQueue.getActive()) {
            this.startDownloadPolling();
            return;
          }

          const nextItem = this.downloadQueue.startNext();
          this.syncQueuedDownloadStates();

          if (!nextItem) {
            this.stopDownloadPolling();
            return;
          }

          this.updateRecordDownload(nextItem.rowKey, {
            state: 'preparing',
            queuePosition: null,
            jobId: '',
            totalInstances: null,
            downloadedInstances: 0,
            error: '',
            downloadedFiles: [],
          });
          this.setConnectionStatus(this.withQueueSummary('Preparing PACS download...'), 'info');

          try {
            const handle = await $electron?.api(
              '@pmt/pacs-client/pacsDownloadStart',
              toPlainDownloadRequest(nextItem.request),
            );
            if (!handle?.jobId) {
              throw new Error('Download job did not return a job id.');
            }

            nextItem.jobId = handle.jobId;
            this.updateRecordDownload(nextItem.rowKey, {
              state: handle.state || 'preparing',
              queuePosition: null,
              jobId: handle.jobId,
              totalInstances: typeof handle.totalInstances === 'number' ? handle.totalInstances : null,
              downloadedInstances: 0,
              error: '',
              downloadedFiles: [],
            });

            this.startDownloadPolling();
            await this.pollActiveDownload();
          } catch (err) {
            await this.finishActiveDownloadWithError(err);
          }
        },

        async selectProfileDraftStorageFolder() {
          const { canceled, filePaths: fullPaths } = await $electron.showOpenDialog({
            properties: ['openDirectory'],
          });
          if (!canceled && fullPaths[0]) {
            this.profileDraft.storageFolder = fullPaths[0];
            this.clearProfileError('storageFolder');
          }
        },

        async runPacsConnect() {
          const port = this.parsePortNumber(this.pacs.port, 'Port');
          if (port === null) {
            this.setConnectionStatus('Connection failed: port must be an integer between 1 and 65535.', 'error');
            return;
          }

          this.setConnectionStatus('Connecting to PACS...', 'info');

          try {
            const connected = await $electron?.api('@pmt/pacs-client/pacsConnect', {
              host: this.pacs.host,
              port,
              calledAet: this.pacs.aet,
              callingAet: this.myAet,
              timeoutSec: this.timeoutSec,
            });
            this.setConnectionStatus(
              connected
                ? `PACS connected successfully: ${this.pacs.aet}@${this.pacs.host}:${port}`
                : `PACS connection failed: ${this.pacs.aet}@${this.pacs.host}:${port}`,
              connected ? 'success' : 'error',
            );
            console.log(`Connect ${connected ? 'succeeded' : 'failed'}`);
          } catch (err) {
            this.setConnectionStatus(`PACS connection failed: ${err?.message ?? err}`, 'error');
            console.error(err);
          }
        },

        async runPacsUpload() {
          const port = this.parsePortNumber(this.pacs.port, 'Port');
          if (port === null) {
            return;
          }

          let rootDir = '';
          const { canceled, filePaths: fullPaths } = await $electron.showOpenDialog({
            properties: ['openDirectory'],
          });
          if (!canceled && fullPaths[0]) {
            rootDir = fullPaths[0];
          }
          if (!rootDir) {
            return;
          }

          const filePaths = (await $electron?.readDirectory(rootDir, true)).filter((filePath) => {
            const fileName = filePath.split('/').pop();
            if (fileName.startsWith('.')) {
              return false;
            }
            if (fileName === 'DICOMDIR') {
              return false;
            }
            if (fileName.toLowerCase().endsWith('.dcm') || !fileName.includes('.')) {
              return true;
            }
            return false;
          });
          if (!filePaths.length) {
            return;
          }

          try {
            const res = await $electron?.api('@pmt/pacs-client/pacsUpload', {
              host: this.pacs.host,
              port,
              calledAet: this.pacs.aet,
              callingAet: this.myAet,
              timeoutSec: this.timeoutSec,
              filePaths,
            });
            console.log(res);
            if (res.success) {
              this.runPacsSearch();
            }
          } catch (err) {
            console.error(err);
          }
        },

        async runPacsSearch() {
          const level = this.searchLevel;
          const queryModel = level === 'PATIENT' ? 'P' : 'S';
          const port = this.parsePortNumber(this.pacs.port, 'Port');
          if (port === null) {
            this.setConnectionStatus('Search failed: port must be an integer between 1 and 65535.', 'error');
            return;
          }

          const keys = this.searchKeys
            .map((key, index) => {
              if (!key.trim()) return null;
              // StudyDate for STUDY level is handled by buildStudyDateKey()
              if (level === 'STUDY' && index === 1) return null;
              return `${this.searchTags[index]}=${key.trim()}`;
            })
            .filter(Boolean);

          if (level === 'STUDY') {
            const dateKey = this.buildStudyDateKey();
            if (dateKey) keys.push(dateKey);
          }

          this.records = [];

          try {
            this.setConnectionStatus('Searching PACS...', 'info');

            const params = {
              host: this.pacs.host,
              port,
              calledAet: this.pacs.aet,
              callingAet: this.myAet,
              timeoutSec: this.timeoutSec,
              level,
              queryModel,
              keys,
            };
            console.log('search with params:', params);
            const res = await $electron?.api('@pmt/pacs-client/pacsSearch', params);
            console.log(res);
            if (res?.success === false) {
              const details = String(res.stderr || res.stdout || '').trim();
              this.setConnectionStatus(
                details
                  ? `Search failed: ${details}`
                  : `Search failed with exit code ${res.exitCode}.`,
                'error',
              );
              return;
            }

            if (res?.records?.length) {
              this.records = this.decorateSearchRecords(res.records);
              this.syncQueuedDownloadStates();
            }
            const recordCount = typeof res?.recordCount === 'number' ? res.recordCount : (res?.records?.length ?? 0);
            this.setConnectionStatus(`Search completed: ${recordCount} record(s) found.`, 'success');
          } catch (err) {
            this.setConnectionStatus(`Search failed: ${err?.message ?? err}`, 'error');
            console.error(err);
          }
        },

        async runPacsDownload(record) {
          const candidate = this.buildDownloadRequest(record);
          if (!candidate) {
            return;
          }

          const enqueueResult = this.downloadQueue.enqueue({
            rowKey: candidate.rowKey,
            request: candidate.request,
            requestFingerprint: candidate.requestFingerprint,
            jobId: null,
          });

          if (!enqueueResult.accepted) {
            this.setConnectionStatus('Download ignored: this result is already active or queued.', 'info');
            return;
          }

          this.updateRecordDownload(candidate.rowKey, {
            state: 'queued',
            queuePosition: enqueueResult.queuePosition,
            jobId: '',
            totalInstances: null,
            downloadedInstances: 0,
            error: '',
            downloadedFiles: [],
          });
          this.syncQueuedDownloadStates();
          this.setConnectionStatus(this.withQueueSummary('Download queued.'), 'info');

          await this.startNextQueuedDownload();
        },

        test() {
          $electron?.api('@pmt/export/test', ...arguments).then((res) => {
            console.debug('api invoke:', '`@pmt/export/test`', res);
          });
        },
      }));

      if (appRoot?._x_dataStack) {
        window.Alpine.destroyTree(appRoot);
        window.Alpine.initTree(appRoot);
      }
    }

    if (window.Alpine) {
      registerApp();
    } else {
      document.addEventListener('alpine:init', registerApp, { once: true });
    }

    window.addEventListener('DOMContentLoaded', () => $electron?.onLoaded());
    window.addEventListener('message', async (e) => {
      if (e.source !== window) {
        return;
      }
      if (e.data?.type === 'load-args') {
        const payload = e.data.args?.[0] ?? {};
        if (payload?.from === 'patient' && payload.selection) {
          console.log('load:', payload);
          setTimeout(() => {
            if (!data) {
              return;
            }
            // ...
          }, 200);
        }
      }
    });
  </script>
