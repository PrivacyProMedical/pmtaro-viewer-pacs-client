<!DOCTYPE html>
<html lang="en" class="scheme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download from DICOM server</title>
  <link href="./tailwind.min.css" rel="stylesheet">
  <style>
    body {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #app {
      position: relative;
      height: 100%;
    }

    button[type="button"] {
      font-weight: 600;
      font-size: small;
      text-transform: uppercase;
    }
    button[type="button"]:not(:disabled) {
      cursor: pointer;
    }
    button:disabled {
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-slate-900 text-white">
  <div id="app" x-data="app">
    <div class="h-full flex flex-col divide-y divide-white/15">
      <div class="flex-none flex flex-wrap divide-x divide-white/15">
        <div class="flex-1 max-w-1/2 flex flex-col divide-y divide-white/15">
          <div class="flex-none flex flex-col p-1.5 pb-3">
            <div class="flex flex-wrap">
              <label class="flex-2 flex flex-col p-1.5">
                <span class="text-sm text-slate-400">My AE Title</span>
                <input type="text" class="bg-slate-800 border-slate-700/10 rounded px-2 py-1 mt-1" x-model="myAet" />
              </label>
              <label class="flex-1 flex flex-col p-1.5">
                <span class="text-sm text-slate-400">Timeout (seconds)</span>
                <input type="number" class="bg-slate-800 border-slate-700/10 rounded px-2 py-1 mt-1" x-model.number="timeoutSec" />
              </label>
            </div>
            <label class="flex-1 flex flex-col p-1.5">
              <span class="text-sm text-slate-400">Storage Folder</span>
              <input type="text" readonly x-model="storageFolder" :title="storageFolder" class="hover:cursor-pointer bg-slate-800 border-slate-700/10 rounded px-2 py-1 mt-1" readonly @click="selectStorageFolder()" />
            </label>
          </div>
          <div class="flex-auto relative">
            <div class="px-0 py-0">
              <div class="flow-root absolute inset-0">
                <div class="mx-0 my-0 w-full h-full overflow-auto">
                  <div class="inline-block min-w-full align-middle px-0 py-0">
                    <table class="table-auto relative min-w-full whitespace-nowrap divide-y divide-white/15">
                      <thead class="sticky top-0 bg-slate-800/90">
                        <tr class="divide-x divide-white/15">
                          <th scope="col" class="p-3 text-left text-sm font-semibold text-slate-300">AE Title</th>
                          <th scope="col" class="p-3 text-left text-sm font-semibold text-slate-300">PACS Address</th>
                          <th scope="col" class="p-3 text-left text-sm font-semibold text-slate-300">Port</th>
                          <th scope="col" class="p-3 text-left text-sm font-semibold text-slate-300">Local Port</th>
                          <th scope="col" class="p-3 text-center">
                            <span class="sr-only">Actions</span>
                          </th>
                        </tr>
                      </thead>
                      <tbody class="divide-y divide-white/15">
                        <tr class="divide-x divide-white/15">
                          <td>
                            <input type="text" class="px-3 py-0 text-left text-sm bg-transparent border-0 ring-0 outline-0 w-full" x-model="pacs.aet" />
                          </td>
                          <td>
                            <input type="text" class="px-3 py-0 text-left text-sm bg-transparent border-0 ring-0 outline-0 w-full" x-model="pacs.host" />
                          </td>
                          <td>
                            <input type="number" min="1" max="65535" step="1" inputmode="numeric" class="px-3 py-0 text-left text-sm bg-transparent border-0 ring-0 outline-0 w-full" x-model.number="pacs.port" />
                          </td>
                          <td>
                            <input type="number" min="1" max="65535" step="1" inputmode="numeric" class="px-3 py-0 text-left text-sm bg-transparent border-0 ring-0 outline-0 w-full" x-model.number="pacs.localPort" />
                          </td>
                          <td class="p-3 text-sm text-center space-x-2">
                            <button type="button" class="font-semibold text-gray-400 hover:text-gray-300 hover:cursor-pointer" @click="runPacsConnect()">
                              <svg class="inline-block size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M2 20h20M9 10l2 2l4-4"/><rect width="18" height="12" x="3" y="4" rx="2"/></g></svg>
                            </button>
                            <button type="button" class="font-semibold text-gray-400 hover:text-gray-300 hover:cursor-pointer" @click="runPacsUpload()">
                              <svg class="inline-block size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="m16 6l-4-4l-4 4m4-4v8"/><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01M10 18h.01"/></g></svg>
                            </button>
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="flex-1 max-w-1/2 flex flex-col">
          <div class="flex-auto flex flex-col p-1.5 pb-3">
            <div class="flex flex-wrap">
              <div class="flex-1 flex flex-col p-1.5">
                <label class="text-sm text-slate-400">Tag</label>
                <template x-for="tag in searchTags">
                  <select class="bg-slate-800 border-slate-700/10 rounded px-2 py-1 mt-2 first-of-type:mt-1" :disabled="true">
                    <option x-text="tag"></option>
                  </select>
                </template>
              </div>
              <div class="flex-1 flex flex-col p-1.5">
                <label class="text-sm text-slate-400">Keyword</label>
                <input type="text" class="bg-slate-800 border-slate-700/10 rounded px-2 py-1 mt-2 first-of-type:mt-1" placeholder="*" x-model="searchKeys[0]" />
                <input type="text" class="bg-slate-800 border-slate-700/10 rounded px-2 py-1 mt-2 first-of-type:mt-1" placeholder="*" x-model="searchKeys[1]" />
                <input type="text" class="bg-slate-800 border-slate-700/10 rounded px-2 py-1 mt-2 first-of-type:mt-1" placeholder="*" x-model="searchKeys[2]" />
                <input type="text" class="bg-slate-800 border-slate-700/10 rounded px-2 py-1 mt-2 first-of-type:mt-1" placeholder="*" x-model="searchKeys[3]" />
              </div>
            </div>
          </div>
          <div class="relative">
            <hr class="absolute inset-x-3 -top-2.5 border-white/15" />
          </div>
          <div class="flex-none flex items-center p-3 py-2 pt-0">
            <fieldset class="flex items-center text-sm text-slate-400">
              <legend class="float-left mr-3">Level:</legend>
              <label class="inline-flex items-center mr-2">
                <input class="text-blue-500 border-0 ring-0 outline-0" type="radio" name="level" x-model="searchLevel" @change="setSearchLevel($event.target.value)" value="PATIENT" />
                <span class="ml-1" :class="searchLevel === 'PATIENT' ? 'text-white' : ''">Patient</span>
              </label>
              <label class="inline-flex items-center mr-2">
                <input class="text-blue-500 border-0 ring-0 outline-0" type="radio" name="level" x-model="searchLevel" @change="setSearchLevel($event.target.value)" value="STUDY" />
                <span class="ml-1" :class="searchLevel === 'STUDY' ? 'text-white' : ''">Study</span>
              </label>
              <label class="inline-flex items-center mr-2">
                <input class="text-blue-500 border-0 ring-0 outline-0" type="radio" name="level" x-model="searchLevel" @change="setSearchLevel($event.target.value)" value="SERIES" />
                <span class="ml-1" :class="searchLevel === 'SERIES' ? 'text-white' : ''">Series</span>
              </label>
            </fieldset>
            <button type="button" class="inline-flex justify-center items-center text-center text-sm ml-auto bg-sky-600 px-3 py-1 rounded hover:cursor-pointer disabled:cursor-not-allowed disabled:bg-sky-300/30 disabled:text-gray-300" :disabled="false" @click="runPacsSearch()">
              <span>Search</span>
            </button>
          </div>
        </div>
      </div>
      <div class="flex-auto relative">
        <div class="px-3 py-2 absolute inset-0 overflow-auto">
          <ul>
            <template x-for="(rec, i) in records">
              <li class="mb-3">
                <fieldset class="relative px-3 pt-1 pb-2 rounded border border-white/15 bg-slate-800/80 hover:bg-slate-800 transition">
                  <legend>
                    <b x-text="`${searchLevel.toLowerCase()} ${i + 1}`" class="ml-3 text-base capitalize"></b>
                  </legend>
                  <template x-for="field in rec.fields">
                    <div class="text-sm">
                      <span x-text="`(${field.tag})`" class="tabular-nums"></span> <span x-text="field.keyword"></span>: <span x-text="field.value"></span>
                    </div>
                  </template>
                  <button type="button" class="text-white disabled:text-white/50 hover:text-sky-500 text-lg! absolute right-0 bottom-0 mx-4 my-2" :disabled="!storageFolder" @click="runPacsDownload(rec)">
                    Download
                  </button>
                </fieldset>
              </li>
            </template>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script src="./alpinejs@3.15.8/dist/cdn.min.js" defer></script>
  <script>
    // export DCMDICTPATH=/opt/homebrew/share/dcmtk-3.7.0/dicom.dic

    const app = document.getElementById('app');
    let data = null;

    document.addEventListener('alpine:init', () => {
      Alpine.data('app', () => {
        return {
          myAet: 'PMTARO',
          timeoutSec: 20,

          
          pacs: {
            aet: 'ORTHANC',
            host: '127.0.0.1',
            port: 4242,
            localPort: 10104,
          },

          records: [],
          get recordsPre() {
            return JSON.stringify(this.records, null, 2);
          },
          storageFolder: '',

          searchLevel: 'PATIENT',
          searchTags: ['PatientID', 'PatientName', 'PatientBirthDate', 'PatientSex'],
          searchKeys: ['', '', '', ''],

          setSearchLevel(lv) {
            this.searchLevel = lv;
            switch(this.searchLevel) {
              case 'PATIENT':
                this.searchTags = ['PatientID', 'PatientName', 'PatientBirthDate', 'PatientSex'];
                this.searchKeys = ['', '', '', ''];
                break;
              case 'STUDY':
                this.searchTags = ['StudyID', 'StudyDate', 'StudyTime', 'StudyDescription'];
                this.searchKeys = ['', '', '', ''];
                break;
              case 'SERIES':
                this.searchTags = ['SeriesDate', 'SeriesTime', 'SeriesDescription', 'Modality'];
                this.searchKeys = ['', '', '', ''];
                break;
              default:
                this.searchTags = [];
                this.searchKeys = [];
            }
          },

          parsePortNumber(value, fieldName) {
            const port = typeof value === 'number' ? value : Number(String(value).trim());
            if (!Number.isInteger(port) || port < 1 || port > 65535) {
              console.error(`${fieldName} must be an integer between 1 and 65535`);
              return null;
            }
            return port;
          },

          async runPacsConnect() {
            const port = this.parsePortNumber(this.pacs.port, 'Port');
            if (port === null) {
              return;
            }

            try {
              const connected = await $electron?.api('@pmt/pacs-client/pacsConnect', {
                host: this.pacs.host,
                port,
                calledAet: this.pacs.aet,
                callingAet: this.myAet,
                timeoutSec: this.timeoutSec,
              });
              console.log(`Connect ${connected ? 'succeeded' : 'failed'}`);
            } catch (err) {
              console.error(err);
            }
          },

          async runPacsUpload() {
            const port = this.parsePortNumber(this.pacs.port, 'Port');
            if (port === null) {
              return;
            }

            let rootDir = '';
            const { canceled, filePaths: fullPaths } = await $electron.showOpenDialog({
              properties: ['openDirectory'],
            });
            if (!canceled && fullPaths[0]) {
              rootDir = fullPaths[0];
            } else {
              rootDir = '';
            }
            if (!rootDir) {
              return;
            }
            const filePaths = (await $electron?.readDirectory(rootDir, true)).filter(filePath => {
              const fileName = filePath.split('/').pop();
              if (fileName.startsWith('.')) {
                return false;
              }
              if (fileName === 'DICOMDIR') {
                return false;
              }
              if (fileName.toLowerCase().endsWith('.dcm') || !fileName.includes('.')) {
                return true;
              }
              return false;
            });
            if (!filePaths.length) {
              return;
            }

            try {
              const res = await $electron?.api('@pmt/pacs-client/pacsUpload', {
                host: this.pacs.host,
                port,
                calledAet: this.pacs.aet,
                callingAet: this.myAet,
                timeoutSec: this.timeoutSec,
                filePaths,
              });
              console.log(res);
              if (res.success) {
                this.runPacsSearch();
              }
            } catch (err) {
              console.error(err);
            }
          },

          async runPacsSearch() {
            // var level = 'PATIENT';
            // var queryModel = 'P';
            // var keys = [] || [`PatientName=${'KAM'}`];

            // level = 'STUDY';
            // queryModel = 'S';
            // keys = [] && [`PatientName=${'KAM'}`, `StudyInstanceUID=${'1.2.840.113619.2.182.1080861414283.1617157566.1121395'}`];

            // level = 'SERIES';
            // queryModel = 'S';
            // keys = [] || [`SeriesInstanceUID=${'1.3.46.670589.11.38008.5.0.8868.2021050810130987123'}`];

            const level = this.searchLevel;
            const queryModel = level === 'PATIENT' ? 'P' : 'S';
            const port = this.parsePortNumber(this.pacs.port, 'Port');
            if (port === null) {
              return;
            }
            const keys = this.searchKeys.map((key, index) => {
              if (!key.trim()) {
                return null;
              }
              return `${this.searchTags[index]}=${key.trim()}`;
            }).filter(Boolean);

            data.records = [];
            try {
              const params = {
                host: this.pacs.host,
                port,
                calledAet: this.pacs.aet,
                callingAet: this.myAet,
                timeoutSec: this.timeoutSec,
                level,
                queryModel,
                keys,
              };
              console.log('search with params:', params);
              const res = await $electron?.api('@pmt/pacs-client/pacsSearch', params);
              console.log(res);
              if (res?.records?.length) {
                data.records = res.records;
              }
            } catch (err) {
              console.error(err);
            }
          },

          async runPacsDownload(record) {
            // var level = 'PATIENT';
            // var keys = [`PatientName=${patientName}`];

            // level = 'STUDY';
            // keys = [`StudyInstanceUID=${'1.2.156.113704.2.284.3.127936524.40.1373344856.493'}`];

            // level = 'SERIES';
            // keys = [`SeriesInstanceUID=${'1.3.12.2.1107.5.1.4.155673.30000022082600113465200040097'}`];

            const level = this.searchLevel;
            const keys = [];
            if (level === 'PATIENT') {
              const patientIdField = record.fields.find(field => field.keyword === 'PatientID');
              if (patientIdField) {
                keys.push(`PatientID=${patientIdField.value}`);
              }
              const patientNameField = record.fields.find(field => field.keyword === 'PatientName');
              if (patientNameField) {
                keys.push(`PatientName=${patientNameField.value}`);
              }
            } else if (level === 'STUDY') {
              const studyInstanceUIDField = record.fields.find(field => field.keyword === 'StudyInstanceUID');
              if (studyInstanceUIDField) {
                keys.push(`StudyInstanceUID=${studyInstanceUIDField.value}`);
              }
            } else if (level === 'SERIES') {
              const seriesInstanceUIDField = record.fields.find(field => field.keyword === 'SeriesInstanceUID');
              if (seriesInstanceUIDField) {
                keys.push(`SeriesInstanceUID=${seriesInstanceUIDField.value}`);
              }
            }
            if (!this.storageFolder) {
              return;
            }

            const port = this.parsePortNumber(this.pacs.port, 'Port');
            if (port === null) {
              return;
            }

            const localPort = this.parsePortNumber(this.pacs.localPort, 'Local Port');
            if (localPort === null) {
              return;
            }

            try {
              const res = await $electron?.api('@pmt/pacs-client/pacsDownload', {
                host: this.pacs.host,
                port,
                localPort,
                calledAet: this.pacs.aet,
                callingAet: this.myAet,
                timeoutSec: this.timeoutSec,
                level,
                keys,
                outputDir: this.storageFolder,
              });
              console.log(res);
              if (res.success) {
                const downloadedFilePath = res.downloadedFiles[0];
                if (downloadedFilePath) {
                  await $electron?.showInFolder(downloadedFilePath, true);
                }
              }
            } catch (err) {
              console.error(err);
            }
          },

          test() {
            $electron?.api('@pmt/export/test', ...arguments).then(res => {
              console.debug('api invoke:', "`@pmt/export/test`", res);
            });
          }
        };
      });
      setTimeout(() => {
        data = app._x_dataStack[0];
      }, 100);
    });

    window.addEventListener('DOMContentLoaded', () => $electron?.onLoaded());
    window.addEventListener('message', async (e) => {
      if (e.source !== window) {
        return;
      }
      if (e.data?.type === 'load-args') {
        const payload = e.data.args?.[0] ?? {};
        if (payload?.from === 'patient' && payload.selection) {
          console.log('load:', payload);
          setTimeout(() => {
            // ...
          }, 200);
        }
      }
    });

    async function selectStorageFolder() {
      const { canceled, filePaths: fullPaths } = await $electron.showOpenDialog({
        properties: ['openDirectory'],
      });
      if (!canceled && fullPaths[0]) {
        data.storageFolder = fullPaths[0];
      } else {
        data.storageFolder = '';
      }
    }
  </script>
</body>
</html>
